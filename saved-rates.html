<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LUSTRE | Saved Rates</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Open+Sauce+One:wght@300;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />

    <style>
      /* ================================================================
         SAVED RATES PAGE — additional styles
         ================================================================ */

      .saved-section {
        min-height: 100vh;
        padding: 120px 60px 80px 60px;
        position: relative;
        z-index: 5;
      }

      .saved-container {
        max-width: 900px;
        margin: 0 auto;
      }

      .saved-header {
        margin-bottom: 50px;
      }

      .saved-header h1 {
        font-family: var(--font-display);
        font-size: 3.5rem;
        margin: 0 0 15px 0;
        letter-spacing: -2px;
        background: linear-gradient(180deg, #fff, #888);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .saved-header p {
        color: var(--text-grey);
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 2px;
        margin: 0;
      }

      /* ---- SAVED CARD WRAPPER ---- */
      .saved-card {
        background: rgba(10, 10, 10, 0.4);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 1px;
        padding: 45px 50px;
        position: relative;
        overflow: hidden;
        margin-bottom: 25px;
      }

      .saved-card::before {
        content: '';
        position: absolute;
        top: 0; left: 0; width: 100%; height: 2px;
        background: linear-gradient(90deg, transparent, var(--neon-green), transparent);
      }

      .saved-card-header {
        display: flex;
        align-items: center;
        gap: 20px;
        margin-bottom: 35px;
      }

      .saved-card-header h2 {
        font-size: 0.9rem;
        letter-spacing: 2px;
        color: white;
        margin: 0;
        white-space: nowrap;
      }

      .saved-card-header .line {
        height: 1px;
        width: 100%;
        background: #1a1a1a;
      }

      /* ---- COUNT BADGE ---- */
      .saved-count-badge {
        font-size: 0.65rem;
        letter-spacing: 2px;
        color: var(--neon-green);
        border: 1px solid rgba(204,235,69,0.25);
        padding: 3px 10px;
        border-radius: 1px;
        white-space: nowrap;
        flex-shrink: 0;
      }

      /* ---- EMPTY STATE ---- */
      .empty-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 60px 20px;
        gap: 18px;
        text-align: center;
      }

      .empty-state-icon {
        font-size: 2.5rem;
        opacity: 0.15;
      }

      .empty-state-title {
        font-size: 0.9rem;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: #333;
      }

      .empty-state-sub {
        font-size: 0.72rem;
        color: #2a2a2a;
        letter-spacing: 1px;
        text-transform: uppercase;
      }

      .empty-state a {
        color: var(--neon-green);
        text-decoration: none;
        font-size: 0.72rem;
        letter-spacing: 2px;
        text-transform: uppercase;
        border-bottom: 1px solid rgba(204,235,69,0.3);
        padding-bottom: 2px;
        transition: border-color 0.25s;
        margin-top: 6px;
        display: inline-block;
      }

      .empty-state a:hover {
        border-color: var(--neon-green);
      }

      /* ---- SAVED ITEMS LIST ---- */
      .saved-list {
        display: flex;
        flex-direction: column;
        gap: 1px;
      }

      .saved-item {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 20px;
        padding: 22px 0;
        border-bottom: 1px solid rgba(255,255,255,0.04);
        transition: background 0.2s ease;
        border-radius: 1px;
      }

      .saved-item:last-child {
        border-bottom: none;
      }

      .saved-item-left {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .saved-item-pair {
        font-family: var(--font-display);
        font-size: 1.6rem;
        color: white;
        letter-spacing: -1px;
        line-height: 1;
      }

      .saved-item-pair .arrow-sep {
        color: var(--neon-green);
        font-size: 1.2rem;
        margin: 0 6px;
      }

      .saved-item-result {
        font-size: 0.75rem;
        color: #888;
        letter-spacing: 1px;
        text-transform: uppercase;
      }

      .saved-item-result strong {
        color: var(--neon-green);
        font-weight: 600;
      }

      .saved-item-meta {
        font-size: 0.62rem;
        color: #333;
        letter-spacing: 1px;
        text-transform: uppercase;
      }

      .saved-item-right {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 10px;
      }

      .saved-item-rate {
        font-size: 0.68rem;
        color: #444;
        letter-spacing: 1px;
        text-transform: uppercase;
        text-align: right;
      }

      .saved-item-rate span {
        color: #666;
      }

      /* Delete button */
      .delete-btn {
        background: transparent;
        border: 1px solid rgba(255,77,77,0.2);
        color: #ff4d4d;
        padding: 6px 14px;
        font-size: 0.6rem;
        letter-spacing: 2px;
        text-transform: uppercase;
        font-family: var(--font-main);
        cursor: pointer;
        border-radius: 1px;
        transition: all 0.25s ease;
        opacity: 0.5;
      }

      .delete-btn:hover {
        opacity: 1;
        background: rgba(255,77,77,0.08);
        border-color: #ff4d4d;
      }

      /* ---- CLEAR ALL BUTTON ---- */
      .clear-all-row {
        display: flex;
        justify-content: flex-end;
        padding-top: 25px;
        border-top: 1px solid rgba(255,255,255,0.04);
        margin-top: 5px;
      }

      .clear-all-btn {
        background: transparent;
        border: none;
        color: #333;
        font-size: 0.65rem;
        letter-spacing: 2px;
        text-transform: uppercase;
        font-family: var(--font-main);
        cursor: pointer;
        transition: color 0.25s ease;
        padding: 4px 0;
      }

      .clear-all-btn:hover {
        color: #ff4d4d;
      }

      /* ---- BACK STRIP ---- */
      .back-strip {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 18px 24px;
        border: 1px solid rgba(255,255,255,0.05);
        border-radius: 1px;
        background: rgba(255,255,255,0.01);
      }

      .back-strip a {
        font-size: 0.68rem;
        color: #444;
        letter-spacing: 1px;
        text-transform: uppercase;
        text-decoration: none;
        transition: color 0.25s;
      }

      .back-strip a:hover {
        color: var(--neon-green);
      }

      .back-strip span {
        font-size: 0.68rem;
        color: #222;
        letter-spacing: 1px;
        text-transform: uppercase;
      }

      /* ---- RESPONSIVE ---- */
      @media (max-width: 768px) {
        .saved-section { padding: 80px 20px 40px; }
        .saved-card { padding: 30px 25px; }
        .saved-header h1 { font-size: 2.5rem; }
        .saved-item { grid-template-columns: 1fr; }
        .saved-item-right { align-items: flex-start; flex-direction: row; justify-content: space-between; }
        .saved-item-pair { font-size: 1.2rem; }
      }
    </style>
  </head>
  <body>

    <div class="cursor-dot"></div>
    <div class="cursor-lens"></div>

    <div class="fixed-background">
      <div class="gradient-overlay"></div>
    </div>
    <div class="bg-grid"></div>

    <nav>
      <div class="logo">
        <a href="index.html"><img src="logo.png" alt="LUSTRE Logo"></a>
      </div>
      <div class="nav-links">
        <a href="exchange.html" class="nav-item">← Exchange</a>
        <a href="index.html" class="nav-item">Home</a>
      </div>
    </nav>

    <section class="saved-section">
      <div class="saved-container">

        <div class="saved-header">
          <div class="admin-badge">STORAGE</div>
          <h1>SAVED RATES</h1>
          <p>Your locally saved currency conversions</p>
        </div>

        <div class="saved-card">
          <div class="saved-card-header">
            <h2>SAVED ITEMS</h2>
            <div class="line"></div>
            <span class="saved-count-badge" id="saved-count-badge">0 SAVED</span>
          </div>

          <!-- Content rendered by JS -->
          <div id="saved-content"></div>

        </div>

        <div class="back-strip">
          <a href="exchange.html">← Back to Exchange Rates</a>
          <span>Stored in browser localStorage</span>
        </div>

      </div>
    </section>

    <footer>
      <p>© 2026 BEYOND. Designed in Bohol.</p>
    </footer>

    <script src="script.js"></script>
    <script>
      /* ================================================================
         SAVED RATES PAGE — reads from localStorage and renders list
         ================================================================ */

      var LS_KEY = 'lustre_saved_rates';

      function getSavedRates() {
        try {
          return JSON.parse(localStorage.getItem(LS_KEY)) || [];
        } catch (e) {
          return [];
        }
      }

      function saveSavedRates(arr) {
        localStorage.setItem(LS_KEY, JSON.stringify(arr));
      }

      function deleteRate(id) {
        var saved = getSavedRates();
        var updated = saved.filter(function(r) { return r.id !== id; });
        saveSavedRates(updated);
        renderSaved();
        if (window.showToast) showToast('Rate removed.', 'success');
      }

      function clearAll() {
        if (!confirm('Remove all saved rates? This cannot be undone.')) return;
        localStorage.removeItem(LS_KEY);
        renderSaved();
        if (window.showToast) showToast('All saved rates cleared.', 'success');
      }

      function renderSaved() {
        var saved = getSavedRates();
        var content = document.getElementById('saved-content');
        var badge   = document.getElementById('saved-count-badge');

        badge.textContent = saved.length + ' SAVED';

        if (saved.length === 0) {
          content.innerHTML =
            '<div class="empty-state">' +
              '<div class="empty-state-icon">◇</div>' +
              '<p class="empty-state-title">No saved rates yet</p>' +
              '<p class="empty-state-sub">Go to the exchange page and click "Save Rate"</p>' +
              '<a href="exchange.html">Go to Exchange →</a>' +
            '</div>';
          return;
        }

        var listHtml = '<div class="saved-list">';

        saved.forEach(function(r) {
          listHtml +=
            '<div class="saved-item">' +
              '<div class="saved-item-left">' +
                '<div class="saved-item-pair">' +
                  r.from +
                  '<span class="arrow-sep">→</span>' +
                  r.to +
                '</div>' +
                '<div class="saved-item-result">' +
                  r.amount.toLocaleString() + ' ' + r.from +
                  ' = <strong>' + r.converted + ' ' + r.to + '</strong>' +
                '</div>' +
                '<div class="saved-item-meta">Saved: ' + r.savedAt + '</div>' +
              '</div>' +
              '<div class="saved-item-right">' +
                '<div class="saved-item-rate">' +
                  '1 ' + r.from + ' = <span>' + Number(r.rate).toFixed(6) + '</span> ' + r.to +
                '</div>' +
                '<button class="delete-btn" onclick="deleteRate(\'' + r.id + '\')">REMOVE</button>' +
              '</div>' +
            '</div>';
        });

        listHtml += '</div>';

        // Clear All button row
        listHtml +=
          '<div class="clear-all-row">' +
            '<button class="clear-all-btn" onclick="clearAll()">CLEAR ALL SAVED RATES</button>' +
          '</div>';

        content.innerHTML = listHtml;
      }

      // Render on page load
      renderSaved();
    </script>
  </body>
</html>
